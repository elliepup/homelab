global:
  checkNewVersion: true
  sendAnonymousUsage: false

log:
  level: info # DEBUG, INFO, WARN, ERROR, CRITICAL
  file: /var/log/traefik/traefik.log 

accesslog:
  filePath: /var/log/traefik/access.log

# Optional API and Dashboard
# api:
#   dashboard: true
#   insecure: false # Set to true only for testing, not recommended in production

entryPoints:
  web:
    address: :80
    # http: # Uncomment if you want to enable HTTP redirection to HTTPS
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https
    # http: # Uncomment if you are using the Traefik Bouncer for CrowdSec
    #   middlewares:
    #     - crowdsec-bouncer@file
  websecure:
    address: :443
    # http: # Uncomment if you are using the Traefik Bouncer for CrowdSec
    #   middlewares:
    #     - crowdsec-bouncer@file


certificatesResolvers:
  cloudflare:
    acme:
      email: your-email@example.com # Change this to your email
      storage: /var/traefik/certs/cloudflare-acme.json
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
        
providers:
  docker:
    exposedByDefault: false # Set to true if you want to expose all containers by default
    network: proxy
  file:
    directory: /etc/traefik
    watch: true